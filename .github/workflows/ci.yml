name: Quality checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Quality check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Enable Corepack
        run: corepack enable
      - name: Verify pnpm
        run: pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run quality checks
        run: pnpm check
